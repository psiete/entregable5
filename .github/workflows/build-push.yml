name: Build and Push to ACR

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Validar tests (opcional pero recomendado)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias para tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests
        run: |
          python -m pytest test_app.py -v --tb=short
        continue-on-error: true  # No bloquear si los tests fallan

      # 3. Autenticarse en Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      # 4. Autenticarse en ACR (usando Azure CLI, alternativa a Docker)
      - name: Login to ACR via Azure CLI
        run: |
          az acr login --name ${{ secrets.AZURE_REGISTRY_NAME }}
        continue-on-error: true

      # 5. Login manual en ACR (usando credenciales directo)
      - name: Docker Login to ACR
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
        continue-on-error: true

      # 6. Build de la imagen Docker
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/mi-backend:${{ github.sha }} \
            -t ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/mi-backend:latest \
            .

      # 7. Push a ACR
      - name: Push image to ACR
        run: |
          docker push ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/mi-backend:${{ github.sha }}
          docker push ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/mi-backend:latest

      # 8. Notificación de éxito
      - name: Success Notification
        if: success()
        run: |
          echo "✅ Build y push completados exitosamente"
          echo "Imagen: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/mi-backend:${{ github.sha }}"
