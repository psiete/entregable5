name: Deploy to Azure Container Instances

# SECRETS REQUERIDOS EN GITHUB:
# - AZURE_CREDENTIALS: Service Principal JSON (az ad sp create-for-rbac)
# - AZURE_RESOURCE_GROUP: Nombre del resource group
# - AZURE_REGISTRY_LOGIN_SERVER: ACR login server
# - AZURE_REGISTRY_USERNAME: ACR username
# - AZURE_REGISTRY_PASSWORD: ACR password
# - POSTGRES_USER: Usuario de PostgreSQL
# - POSTGRES_PASSWORD: Contraseña de PostgreSQL
# - POSTGRES_DB: Nombre de la base de datos

on:
  workflow_run:
    workflows: ["Build and Push to Azure Container Registry"]
    types: [completed]
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Autenticarse en Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2. Obtener IP de PostgreSQL (si el contenedor ya existe)
      - name: Get PostgreSQL IP
        id: get-postgres-ip
        run: |
          echo "🔍 Buscando contenedor PostgreSQL en producción..."
          POSTGRES_IP=$(az container show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name postgres-bd-produccion \
            --query ipAddress.ip -o tsv 2>/dev/null || echo "")
          
          if [ -z "$POSTGRES_IP" ]; then
            echo "⚠️ Contenedor PostgreSQL NO encontrado"
            echo "📖 Instrucciones: Crear PostgreSQL primero usando FASE4_DESPLIEGUE_MANUAL.md"
            echo "   Comando: az container create --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name postgres-bd-produccion ..."
            echo "postgres_ip=" >> $GITHUB_OUTPUT
          else
            echo "✅ PostgreSQL encontrado en IP: $POSTGRES_IP"
            echo "postgres_ip=$POSTGRES_IP" >> $GITHUB_OUTPUT
          fi

      # 3. Actualizar o crear contenedor de la app
      - name: Deploy App to ACI
        if: steps.get-postgres-ip.outputs.postgres_ip != ''
        run: |
          echo "🚀 Desplegando aplicación FastAPI a Azure Container Instances..."
          
          # Eliminar contenedor anterior si existe
          az container delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name fastapi-app-produccion \
            --yes 2>/dev/null || echo "ℹ️ Contenedor anterior no existía"

          # Crear nuevo contenedor con la última imagen
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name fastapi-app-produccion \
            --image ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/mi-backend:latest \
            --cpu 1 \
            --memory 1 \
            --environment-variables \
              POSTGRES_HOST="${{ steps.get-postgres-ip.outputs.postgres_ip }}" \
              POSTGRES_PORT="5432" \
              POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
              POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
              POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
              APP_ENV="production" \
            --registry-login-server ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }} \
            --registry-username ${{ secrets.AZURE_REGISTRY_USERNAME }} \
            --registry-password ${{ secrets.AZURE_REGISTRY_PASSWORD }} \
            --ports 8000 \
            --protocol TCP \
            --restart-policy OnFailure

      # 4. Esperar a que el contenedor esté listo
      - name: Wait for deployment
        if: steps.get-postgres-ip.outputs.postgres_ip != ''
        run: |
          echo "⏳ Esperando 30 segundos a que la aplicación inicie..."
          sleep 30

      # 5. Obtener detalles de la aplicación desplegada
      - name: Get deployment info
        if: steps.get-postgres-ip.outputs.postgres_ip != ''
        id: get-app-info
        run: |
          echo "📋 Obteniendo información del despliegue..."
          
          APP_INFO=$(az container show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name fastapi-app-produccion \
            --query "{ ip: ipAddress.ip, ports: ipAddress.ports[0].port, fqdn: ipAddress.fqdn }")
          
          APP_IP=$(echo $APP_INFO | jq -r '.ip')
          echo "app_ip=$APP_IP" >> $GITHUB_OUTPUT
          
          echo "✅ Aplicación desplegada exitosamente"
          echo "📍 IP Pública: $APP_IP"
          echo "🌐 URL: http://$APP_IP:8000"
          echo "📚 Documentación: http://$APP_IP:8000/docs"

      # 6. Validación: Intentar acceder al healthcheck
      - name: Validate application deployment
        if: steps.get-postgres-ip.outputs.postgres_ip != ''
        run: |
          echo "🧪 Validando que la aplicación está accesible..."
          
          # Intentar alcanzar /health endpoint (requiere que lo agreguemos a app.py)
          for i in {1..10}; do
            if curl -f http://${{ steps.get-app-info.outputs.app_ip }}:8000/health 2>/dev/null; then
              echo "✅ Aplicación respondiendo correctamente"
              exit 0
            fi
            echo "⏳ Intento $i/10 - esperando..."
            sleep 5
          done
          
          echo "⚠️ Healthcheck no respondió, pero la aplicación puede seguir iniciando"
          echo "   Ver logs con: az container logs -g ${{ secrets.AZURE_RESOURCE_GROUP }} -n fastapi-app-produccion"

      # 7. Resumen del despliegue
      - name: Deployment Summary
        if: steps.get-postgres-ip.outputs.postgres_ip != ''
        run: |
          echo "════════════════════════════════════════════════════"
          echo "✅ DESPLIEGUE COMPLETADO EXITOSAMENTE"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "📍 Detalles de la Aplicación:"
          echo "   - Nombre: fastapi-app-produccion"
          echo "   - IP Pública: ${{ steps.get-app-info.outputs.app_ip }}"
          echo "   - URL: http://${{ steps.get-app-info.outputs.app_ip }}:8000"
          echo "   - Documentación: http://${{ steps.get-app-info.outputs.app_ip }}:8000/docs"
          echo ""
          echo "🔧 Comandos útiles:"
          echo "   Ver logs: az container logs -g ${{ secrets.AZURE_RESOURCE_GROUP }} -n fastapi-app-produccion --follow"
          echo "   Ver estado: az container show -g ${{ secrets.AZURE_RESOURCE_GROUP }} -n fastapi-app-produccion"
          echo "   Ver eventos: az container show -g ${{ secrets.AZURE_RESOURCE_GROUP }} -n fastapi-app-produccion --query containers[0].instanceView.events"
          echo ""
          echo "📖 Documentación: Ver FASE6_MONITOREO.md para más detalles"
          echo "════════════════════════════════════════════════════"

      - name: Deployment Warning
        if: steps.get-postgres-ip.outputs.postgres_ip == ''
        run: |
          echo "❌ DESPLIEGUE NO COMPLETADO"
          echo ""
          echo "⚠️ El contenedor de PostgreSQL no está desplegado"
          echo ""
          echo "📖 Para desplegar PostgreSQL primero:"
          echo "   1. Seguir los pasos en FASE4_DESPLIEGUE_MANUAL.md"
          echo "   2. Crear un contenedor PostgreSQL en ACI"
          echo "   3. Luego, re-ejecutar este workflow"
          echo ""
          echo "Una vez PostgreSQL esté listo, el próximo push a main desplegará la aplicación automáticamente"
          exit 1
